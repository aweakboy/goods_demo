spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/trading_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

# Local file upload directory. Use an absolute path in production.
app:
  upload-dir: ./uploads
  order:
    payment-timeout-minutes: 30
    refund-window-days: 7

jwt:
  secret: ${JWT_SECRET:a-very-long-dev-only-secret-key-change-me-at-least-256-bits}
  access-token-expiration: 900000       # 15 minutes in ms
  refresh-token-expiration: 604800000   # 7 days in ms

logging:
  level:
    com.trading: INFO
    org.hibernate.SQL: WARN

map:
  provider: amap
  enabled: true
  web-service-key: ${AMAP_WEB_SERVICE_KEY:}
  connect-timeout-ms: 3000
  read-timeout-ms: 5000

shipping:
  simulation:
    enabled: true
  route-planning:
    enabled: true
    provider: amap
    connect-timeout-ms: 3000
    read-timeout-ms: 5000
    strategy: "0"
    min-refresh-interval-minutes: 10
  default-delivery-days: 3

alipay:
  app-id: ${ALIPAY_APP_ID:}
  private-key: ${ALIPAY_PRIVATE_KEY:}
  alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
  notify-url: ${ALIPAY_NOTIFY_URL:}
  return-url: http://localhost:8080/api/v1/payment/return
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  frontend-url: http://localhost:5173
