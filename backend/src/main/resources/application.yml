spring:
  datasource:
    url: jdbc:mysql://localhost:3306/trading_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456789
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
  sql:
    init:
      mode: never

server:
  port: 8080

jwt:
  secret: a-very-long-secret-key-for-jwt-signing-at-least-256-bits-long-abc123
  access-token-expiration: 900000       # 15 minutes in ms
  refresh-token-expiration: 604800000   # 7 days in ms

logging:
  level:
    com.trading: INFO
